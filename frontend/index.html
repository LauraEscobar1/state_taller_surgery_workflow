<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujo Quirúrgico - Healthcare</title>

    <!-- Google Fonts: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="google-container">

        <!-- Header estilo Google -->
        <header class="google-header">
            <div class="logo">
                <span class="material-icons-outlined">local_hospital</span>
                <span class="title">Flujo Quirúrgico</span>
            </div>
        </header>

        <!-- Card principal estilo Material -->
        <div class="google-card" id="card">
            <div class="card-header">
                <span class="material-icons-outlined card-icon" id="stateIcon">pending</span>
                <span class="card-label">Estado actual</span>
            </div>
            <p class="state-text" id="state">Cargando...</p>
            <div class="state-chip" id="stateChip">
                <span id="chipText">-</span>
            </div>
        </div>

        <!-- Botón estilo Material -->
        <button class="google-button" onclick="nextStep()">
            <span class="material-icons-outlined">arrow_forward</span>
            Avanzar proceso
        </button>

        <!-- Timeline estilo Google -->
        <div class="timeline-container">
            <div class="timeline-track">
                <div class="timeline-step" data-step="registered">
                    <div class="step-circle">
                        <span class="material-icons-outlined">edit_note</span>
                    </div>
                    <span class="step-label">Registro</span>
                </div>
                <div class="timeline-step" data-step="evaluated">
                    <div class="step-circle">
                        <span class="material-icons-outlined">search</span>
                    </div>
                    <span class="step-label">Evaluación</span>
                </div>
                <div class="timeline-step" data-step="preop">
                    <div class="step-circle">
                        <span class="material-icons-outlined">biotech</span>
                    </div>
                    <span class="step-label">Pre-op</span>
                </div>
                <div class="timeline-step" data-step="surgery">
                    <div class="step-circle">
                        <span class="material-icons-outlined">medical_services</span>
                    </div>
                    <span class="step-label">Cirugía</span>
                </div>
                <div class="timeline-step" data-step="recovery">
                    <div class="step-circle">
                        <span class="material-icons-outlined">favorite</span>
                    </div>
                    <span class="step-label">Recuperación</span>
                </div>
                <div class="timeline-step" data-step="discharged">
                    <div class="step-circle">
                        <span class="material-icons-outlined">check_circle</span>
                    </div>
                    <span class="step-label">Alta</span>
                </div>
                <div class="timeline-progress" id="progress"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
